services:
  web:
    build: .
    restart: unless-stopped
    environment:
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-https://api.8989886.xyz/v1}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      VISION_ORCHESTRATOR_MODEL: ${VISION_ORCHESTRATOR_MODEL:-gpt-5.6-sol}
      AI_JOB_DIR: ${AI_JOB_DIR:-/tmp/scene-fit-ai-jobs}
    ports:
      - "127.0.0.1:3000:3000"
