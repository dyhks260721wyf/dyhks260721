services:
  web:
    build: .
    restart: unless-stopped
    environment:
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-https://ark.cn-beijing.volces.com/api/plan/v3/images/generations}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_API_MODEL: ${IMAGE_API_MODEL:-doubao-seedream-5.0-lite}
      IMAGE_API_SIZE: ${IMAGE_API_SIZE:-2K}
      AI_JOB_DIR: ${AI_JOB_DIR:-/tmp/scene-fit-ai-jobs}
    ports:
      - "127.0.0.1:3000:3000"
